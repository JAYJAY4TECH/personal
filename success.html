<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Error</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100dvh; /* 👈 key fix for mobile */
        width: 100%;
        overflow: hidden;
        position: relative;
    }

    img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* fills screen properly */
        display: block;
    }

    h1 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        text-align: center;
        font-size: clamp(1.5rem, 5vw, 3rem); /* responsive text */
        padding: 0 10px;
    }
</style>
</head>

<body>

<h1>Error receiving your airdrop</h1>
<img src="./succes.jpg" alt="">

</body>
</html>
